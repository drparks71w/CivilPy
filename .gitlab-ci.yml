# DEFINE STAGES EXPLICITLY TO CONTROL ORDER
stages:
  - sanity  # The blocker stage
  - test    # The matrix stage
  - deploy  # The release stage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"

# Global Cache
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip_cache/
    - venv/

# --- TEMPLATE (Does not run, just holds the script) ---
.test_logic:
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade setuptools pip
    - pip install -e ".[db,geo,web,jupyter,validation]"
    - pytest --cov --cov-report term --cov-report xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# --- STAGE 1: SANITY CHECK (The Blocker) ---
# If this fails, the pipeline STOPS here.
smoke-test-3.11:
  extends: .test_logic
  stage: sanity
  image: python:3.11
  rules:
    - if: $CI_COMMIT_TITLE =~ /\[docs\]/
      when: never
    - if: $CI_COMMIT_TITLE =~ /-no_tests/
      when: never
    # Run on MRs and Main
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- STAGE 2: COMPATIBILITY MATRIX ---
# These run only if smoke-test-3.11 passed.
verify-3.10:
  extends: .test_logic
  stage: test
  image: python:3.10
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TITLE =~ /\[docs\]/
      when: never
    - if: $CI_COMMIT_TITLE =~ /-no_tests/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

verify-3.12:
  extends: .test_logic
  stage: test
  image: python:3.12
  rules:
    - if: $CI_COMMIT_TITLE =~ /\[docs\]/
      when: never
    - if: $CI_COMMIT_TITLE =~ /-no_tests/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

