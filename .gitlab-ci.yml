pypi_publish:
  stage: deploy
  image: python:3.11
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /Release .*/
  script:
    - pip install -U build twine setuptools
    - python -m build
    - twine upload --verbose dist/*

gitlab_publish:
  stage: deploy
  image: python:3.11
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /Release .*/
  script:
    - pip install build twine setuptools
    - python -m build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --verbose --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*

pages:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r docs/requirements.txt
    - pip install .
    - python -m sphinx docs public
  artifacts:
    paths:
      - public
  rules:
    # [docs] tag: deploy docs even when tests are skipped
    - if: $CI_COMMIT_TITLE =~ /\[docs\]/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH