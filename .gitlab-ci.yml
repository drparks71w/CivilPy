    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- STAGE 3: DEPLOY ---
# Triggered by git tags:
#   git tag docs && git push --tags          → deploys pages only
#   git tag v0.1.41 && git push --tags       → releases to PyPI + GitLab package registry
#   git push (no tag)                        → pages deploys on master commits

pypi_publish:
  stage: deploy
  image: python:3.11
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/     # tags like v0.1.41, v1.0.0
  script:
    - pip install -U build twine setuptools
    - python -m build
    - twine upload --verbose dist/*

gitlab_publish:
  stage: deploy
  image: python:3.11
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/     # tags like v0.1.41, v1.0.0
  script:
    - pip install build twine setuptools
    - python -m build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --verbose --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*

pages:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r docs/requirements.txt
    - pip install .
    - python -m sphinx docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_TAG == "docs"                 # git tag docs && git push --tags
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/     # also deploy on version tags
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH  # and on every master commit
