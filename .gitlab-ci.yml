# 1. GLOBAL VARIABLES & CACHE
# This tells pip to put files in a local folder, and GitLab to save that folder between runs.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip_cache/
    - venv/

# 2. TEST TEMPLATE (Added a '.' to make it hidden)
# This prevents it from running as a duplicate job in the '.pre' stage.
.test_code_coverage:
  stage: test
  rules:
    - if: $CI_COMMIT_TITLE =~ /-no_tests/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade setuptools pip
    - pip install -r requirements.txt
    - pip install .
    - pytest --cov --cov-report term --cov-report xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# 3. TEST JOBS
verify-3.10:
  extends: .test_code_coverage
  image: python:3.10

verify-3.11:
  extends: .test_code_coverage
  image: python:3.11

verify-3.12:
  extends: .test_code_coverage
  image: python:3.12

verify-3.13:
  extends: .test_code_coverage
  image: python:3.13
  allow_failure: true

# Note: This will likely fail without installing 'gdal-bin' via apt-get first
verify-3.14:
  extends: .test_code_coverage
  image: python:3.14
  allow_failure: true

# 4. DEPLOY JOBS
# Switched image back to 3.11 to prevent 'fiona' build errors during deploy.
pypi_publish:
  stage: deploy
  image: python:3.11
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /Release .*/
  script:
    - pip install -U build twine setuptools
    # Standardized on 'build' (setup.py sdist is deprecated)
    - python -m build
    - twine upload --verbose dist/*

gitlab_publish:
  stage: deploy
  image: python:3.11
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /Release .*/
  script:
    - pip install build twine setuptools
    - python -m build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --verbose --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*

pages:
  stage: deploy
  image: alpine:latest  # Changed to alpine for speed (files copy faster)
  script:
    - mkdir .public
    - cp -r src/civilpy/webpages/* .public
    - mv .public public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"